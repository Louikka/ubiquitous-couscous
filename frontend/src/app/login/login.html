<div class="background-pattern  w-full h-full flex">
    <div class="grow"></div>

    <div class="w-100 h-full p-4 bg-(--app-global-background-color)">
        <form class="flex flex-col mt-4" (submit)="onSubmit($event)">
            <div>
                <input
                    #loginUsername
                    class="app-input  w-full px-3 py-1 text-lg"
                    type="text"
                    placeholder="Username"
                    autocomplete="username"
                    required
                />
            </div>
            <div>
                <input
                    #loginPassword
                    class="app-input  w-full mt-1.5 px-3 py-1 text-lg"
                    type="password"
                    placeholder="Password"
                    autocomplete="current-password"
                    required
                />
            </div>

            @if (errorMessage$ | async; as errorMessage)
            {
                <div class="mt-1 ml-1 text-sm text-red-500">{{ errorMessage }}</div>
            }

            <div>
                <input class="app-button  mt-2 px-3 py-1 text-lg" type="submit" value="Log In" />
            </div>
            <div class="mt-1 ml-1 text-sm">
                Don't have an account yet? <a href="/register" class="app-link">Sign in</a>
            </div>
        </form>
    </div>
</div>
