<div class="bg-pattern  relative w-full h-full bg-(--app-sub-bg-color)">

    <form class="absolute top-1/2 left-1/2 -translate-1/2 p-4 flex flex-col gap-2 bg-(--app-bg-color) rounded-sm" (submit)="onSubmit($event)">
        <div>
            <input #registerUsername class="app-input  w-full px-2 py-1 text-lg" type="text" placeholder="Username" autocomplete="username" required />
        </div>
        <div>
            <input #registerPassword1 class="app-input  w-full px-2 py-1 text-lg" type="password" placeholder="Password" autocomplete="current-password" required />
        </div>
        <div>
            <input #registerPassword2 class="app-input  w-full px-2 py-1 text-lg" type="password" placeholder="Repeat password" autocomplete="current-password" required />
        </div>

        @if (errorMessage$ | async; as errorMessage)
        {
            <div class="text-sm text-red-500">{{ errorMessage }}</div>
        }

        <div>
            <input class="app-button  px-2 py-1 text-lg" type="submit" value="Sign In" />
        </div>
        <div class="text-sm">
            Already have an account? <a href="/login" class="app-link">Log in</a>
        </div>
    </form>

</div>
