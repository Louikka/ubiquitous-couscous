<div class="background-pattern  w-full h-full flex">
    <div class="grow"></div>

    <div class="w-100 h-full p-4 bg-(--app-global-background-color)">
        <form class="mt-4 flex flex-col" (submit)="onSubmit($event)">
            <div>
                <input
                    #registerUsername
                    class="app-input  w-full px-3 py-1 text-lg"
                    type="text"
                    placeholder="Username"
                    autocomplete="username"
                    required
                />
            </div>
            <div>
                <input
                    #registerPassword
                    class="app-input  w-full mt-1.5 px-3 py-1 text-lg"
                    type="password"
                    placeholder="Password"
                    autocomplete="current-password"
                    required
                />
            </div>
            <div>
                <input
                    #registerPasswordRepeat
                    class="app-input  w-full mt-1.5 px-3 py-1 text-lg"
                    type="password"
                    placeholder="Repeat password"
                    autocomplete="current-password"
                    required
                />
            </div>

            @if (errorMessage$ | async; as errorMessage)
            {
                <div class="mt-1 ml-1 text-sm text-red-500">{{ errorMessage }}</div>
            }

            <div>
                <input class="app-button  mt-2 px-3 py-1 text-lg" type="submit" value="Sign In" />
            </div>
            <div class="mt-1 ml-1 text-sm">
                Already have an account? <a href="/login" class="app-link">Log in</a>
            </div>
        </form>
    </div>
</div>
