<div class="app-area  w-full h-full p-2 flex flex-col">
    <!-- chat controls buttons -->
    <div class="mt-4 flex flex-col gap-2">
        <input class="app-button  px-3 py-1 text-lg" type="button" value="Create new chat" (click)="toCreate($event)" />
        <input class="app-button  px-3 py-1 text-lg" type="button" value="Join chat" (click)="toJoin($event)" />
    </div>
    <!-- user chats -->
    <div class="mt-4 flex flex-col gap-2">
        @for (chat of auth.userData?.active_chats; track chat)
        {
            <div>Chat "{{ chat }}"</div>
        }
    </div>
</div>
