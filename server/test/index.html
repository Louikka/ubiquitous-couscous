<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>test</title>

    <script type="text/javascript">
        window.onload = function()
        {
            let ws = null;
            const msg = document.getElementById('msg');
            const log = document.getElementById('log');

            function appendLog(item)
            {
                log.appendChild(item);

                if (log.scrollTop > (log.scrollHeight - log.clientHeight - 1))
                {
                    log.scrollTop = log.scrollHeight - log.clientHeight;
                }
            }

            document.getElementById('form').onsubmit = () =>
            {
                if (!msg.value || msg.value.length === 0)
                {
                    return false;
                }


                fetch('http://localhost:8081/api/messages', {
                    method : 'POST',
                    headers : {
                        'Content-Type' : 'application/json',
                    },
                    body : JSON.stringify({
                        content : {
                            id : Date.now(),
                            user : 'User',
                            text : msg.value,
                        },
                    }),
                });

                msg.value = '';

                return false;
            };

            if (window['WebSocket'])
            {
                ws = new WebSocket('ws://localhost:8080');

                ws.onclose = (ev) =>
                {
                    let e = document.createElement('div');
                    e.innerHTML = '<b>Connection closed.</b>';
                    appendLog(e);
                };

                ws.onmessage = (ev) =>
                {
                    let data;

                    try
                    {
                        data = JSON.parse(ev.data);
                    }
                    catch (err)
                    {
                        console.error(err);
                        return;
                    }

                    if (data.type === 'message')
                    {
                        let message = data.content;

                        let e = document.createElement('div');
                        e.textContent = `${message.user} : ${message.text}`;
                        appendLog(e);
                    }
                    else
                    {
                        console.log('Recieved data from WebSocket are not of type "message".')
                    }
                };
            }
            else
            {
                var e = document.createElement('div');
                e.innerHTML = '<b>Your browser does not support WebSockets.</b>';
                appendLog(e);
            }
        };
    </script>

    <style type="text/css">
        html {
            overflow: hidden;
        }

        body {
            overflow: hidden;
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            background: gray;
        }

        #log {
            background: white;
            margin: 0;
            padding: 0.5em 0.5em 0.5em 0.5em;
            position: absolute;
            top: 0.5em;
            left: 0.5em;
            right: 0.5em;
            bottom: 3em;
            overflow: auto;
        }

        #form {
            padding: 0 0.5em 0 0.5em;
            margin: 0;
            position: absolute;
            bottom: 1em;
            left: 0px;
            width: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="log"></div>
    <form id="form">
        <input type="submit" value="Send" />
        <input type="text" id="msg" size="64" autofocus />
    </form>
</body>

</html>
